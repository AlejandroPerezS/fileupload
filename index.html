<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Add this to your CSS */
        #logged-in {
            display: none;
        }
        /* --- Global Resets & Theme --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Dashboard Container --- */
        #logged\ in\? {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
        }

        /* --- Card Layout for Windows --- */
        #logged-in, #logged-out {
            background: #ffffff;
            flex: 1;
            min-width: 320px;
            max-width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f5;
            transition: transform 0.2s ease;
        }

        #logged-in:hover, #logged-out:hover {
            transform: translateY(-2px);
        }

        /* --- Form Styling --- */
        fieldset {
            border: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        legend {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 10px;
            padding: 0;
        }

        /* --- Labels & Inputs --- */
        label.form-items {
            font-size: 0.85rem;
            font-weight: 600;
            color: #7f8c8d;
            margin-bottom: -5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input.form-items {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #dcdde1;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #2f3640;
            background-color: #fcfcfc;
            transition: all 0.2s ease-in-out;
        }

        input.form-items:focus {
            outline: none;
            border-color: #3498db;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        /* File Input Customization Spacing */
        input[type="file"].form-items {
            padding: 8px;
            background: #f8f9fa;
            cursor: pointer;
        }

        /* --- Buttons --- */
        button.form-items {
            margin-top: 10px;
            padding: 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }

        button.form-items:hover {
            background-color: #27ae60;
        }

        button.form-items:active {
            transform: scale(0.98);
        }

        /* Log-in specific button color override (Optional, for visual distinction) */
        #logged-out button.form-items {
            background-color: #3498db;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }

        #logged-out button.form-items:hover {
            background-color: #2980b9;
        }
    </style>
    <meta charset="UTF-8">
    <title>Crocheted Dream Dashboard</title>
</head>
<body>
    <div id="logged in?" class="log in" >
        <div id="logged-out">
            <div id="log-in-window" class="liw">
                <form action="/app/dashboard.js" method="POST" class="form-center" name="Please enter the product information">
                    <fieldset>
                        <legend class="legends">Please log in</legend>
                        <label for="username" class="form-items">Username</label>
                        <input type="text" class="form-items" name="username" id="username" placeholder="Username" required>
                        <label for="password" class="form-items">Password</label>
                        <input type="password" class="form-items" name="password" id="password" placeholder="Password" required>
                        <button type="submit" class="form-items">Submit</button>

                    </fieldset>
                </form>
            </div>

        </div>
    </div>
<script>
    document.cookie = "logged_in=false"
    if (document.cookie.includes("logged_in=false") ){
        document.getElementById("logged-in").style.display = "none";
    }else if(document.cookie.includes("logged_in=true")){
        document.getElementById("logged-in").style.display = "block";
    }
</script>
</body>
</html>
